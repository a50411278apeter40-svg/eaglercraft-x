<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="EaglerCraft 26.1.2 - Minecraft in your browser">
    <meta name="theme-color" content="#1a1a2e">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <title>EaglerCraft 26.1.2</title>
    <style>
        /* ===== Reset & Base ===== */
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #1a1a2e;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, sans-serif;
            color: #e0e0e0;
            touch-action: none;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }

        /* ===== Canvas ===== */
        #eaglercraft {
            display: block;
            width: 100vw;
            height: 100vh;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
        }

        /* ===== Loading Screen ===== */
        #loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            transition: opacity 0.5s ease-out;
        }

        #loading-screen.fade-out {
            opacity: 0;
            pointer-events: none;
        }

        .loading-title {
            font-size: 2.5rem;
            font-weight: 700;
            color: #e94560;
            margin-bottom: 0.5rem;
            text-shadow: 0 0 20px rgba(233, 69, 96, 0.5);
            letter-spacing: 2px;
        }

        .loading-subtitle {
            font-size: 1rem;
            color: #a0a0b0;
            margin-bottom: 2rem;
            letter-spacing: 4px;
            text-transform: uppercase;
        }

        .loading-version {
            font-size: 0.8rem;
            color: #666;
            margin-bottom: 1.5rem;
        }

        /* Progress Bar */
        .progress-container {
            width: 320px;
            max-width: 80vw;
        }

        .progress-bar-track {
            width: 100%;
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
            overflow: hidden;
            position: relative;
        }

        .progress-bar-fill {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #e94560, #ff6b6b);
            border-radius: 3px;
            transition: width 0.3s ease-out;
            position: relative;
        }

        .progress-bar-fill::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(
                90deg,
                transparent 0%,
                rgba(255, 255, 255, 0.3) 50%,
                transparent 100%
            );
            animation: shimmer 1.5s infinite;
        }

        @keyframes shimmer {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        .progress-text {
            text-align: center;
            font-size: 0.8rem;
            color: #888;
            margin-top: 0.75rem;
        }

        .progress-detail {
            text-align: center;
            font-size: 0.7rem;
            color: #555;
            margin-top: 0.3rem;
        }

        /* Spinning logo */
        .loading-logo {
            width: 80px;
            height: 80px;
            margin-bottom: 2rem;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.05); opacity: 1; }
        }

        .loading-logo svg {
            width: 100%;
            height: 100%;
        }

        /* ===== Error Overlay ===== */
        #error-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(26, 26, 46, 0.95);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            padding: 2rem;
        }

        #error-overlay.visible {
            display: flex;
        }

        .error-title {
            font-size: 1.5rem;
            font-weight: 700;
            color: #e94560;
            margin-bottom: 1rem;
        }

        .error-message {
            font-size: 0.9rem;
            color: #ccc;
            text-align: center;
            max-width: 500px;
            line-height: 1.5;
            margin-bottom: 1.5rem;
        }

        .error-details {
            font-size: 0.75rem;
            color: #666;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 6px;
            padding: 1rem;
            max-width: 600px;
            max-height: 200px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            white-space: pre-wrap;
            word-break: break-all;
        }

        .error-button {
            margin-top: 1.5rem;
            padding: 0.6rem 2rem;
            background: #e94560;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 0.9rem;
            cursor: pointer;
            transition: background 0.2s;
        }

        .error-button:hover {
            background: #ff6b6b;
        }

        /* ===== Crash Report ===== */
        #crash-report {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            z-index: 3000;
            padding: 2rem;
            overflow-y: auto;
        }

        #crash-report.visible {
            display: block;
        }

        #crash-report pre {
            color: #e94560;
            font-family: 'Courier New', monospace;
            font-size: 0.8rem;
            white-space: pre-wrap;
            word-break: break-all;
        }

        /* ===== Mobile Controls Overlay ===== */
        #mobile-controls {
            display: none;
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            padding: 10px;
            z-index: 500;
        }

        @media (pointer: coarse) {
            #mobile-controls {
                display: flex;
                justify-content: space-between;
                align-items: flex-end;
            }
        }

        /* ===== Safe Area Support ===== */
        @supports (padding: env(safe-area-inset-bottom)) {
            #mobile-controls {
                padding-bottom: calc(10px + env(safe-area-inset-bottom));
            }
        }

        /* ===== Context Menu Override ===== */
        #eaglercraft {
            -webkit-tap-highlight-color: transparent;
        }

        /* ===== WebGL2 Check ===== */
        .webgl2-error {
            text-align: center;
            padding: 2rem;
        }

        .webgl2-error h2 {
            color: #e94560;
            margin-bottom: 1rem;
        }

        .webgl2-error p {
            color: #888;
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <!-- Loading Screen -->
    <div id="loading-screen">
        <div class="loading-logo">
            <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                <rect x="10" y="10" width="30" height="30" fill="#4a8f4a" rx="2"/>
                <rect x="35" y="10" width="30" height="30" fill="#3d7a3d" rx="2"/>
                <rect x="60" y="10" width="30" height="30" fill="#4a8f4a" rx="2"/>
                <rect x="10" y="35" width="30" height="30" fill="#3d7a3d" rx="2"/>
                <rect x="35" y="35" width="30" height="30" fill="#2d6b2d" rx="2"/>
                <rect x="60" y="35" width="30" height="30" fill="#3d7a3d" rx="2"/>
                <rect x="10" y="60" width="30" height="30" fill="#4a8f4a" rx="2"/>
                <rect x="35" y="60" width="30" height="30" fill="#3d7a3d" rx="2"/>
                <rect x="60" y="60" width="30" height="30" fill="#4a8f4a" rx="2"/>
            </svg>
        </div>
        <div class="loading-title">EaglerCraft</div>
        <div class="loading-subtitle">Minecraft in your browser</div>
        <div class="loading-version">Version 26.1.2</div>
        <div class="progress-container">
            <div class="progress-bar-track">
                <div class="progress-bar-fill" id="progress-fill"></div>
            </div>
            <div class="progress-text" id="progress-text">Initializing...</div>
            <div class="progress-detail" id="progress-detail"></div>
        </div>
    </div>

    <!-- Main Canvas -->
    <canvas id="eaglercraft"></canvas>

    <!-- Error Overlay -->
    <div id="error-overlay">
        <div class="error-title">An Error Occurred</div>
        <div class="error-message" id="error-message">EaglerCraft encountered an error and cannot continue.</div>
        <div class="error-details" id="error-details"></div>
        <button class="error-button" onclick="location.reload()">Reload Page</button>
    </div>

    <!-- Crash Report -->
    <div id="crash-report">
        <pre id="crash-report-content"></pre>
    </div>

    <!-- EaglerCraft Configuration -->
    <script type="text/javascript">
        // ===== EaglerCraft X Options =====
        window.eaglercraftXOpts = {
            container: "eaglercraft",
            assetsURI: "assets.epk",
            localesURI: "lang/",
            worldsDB: "worlds",
            resourcePacksDB: "resourcePacks",
            servers: [
                { addr: "localhost", name: "Local Server" }
            ],
            relays: [
                { addr: "wss://relay.eaglercraft.com/", name: "Eagler Relay", primary: true }
            ],
            enableMinceraft: true,
            crashOnUncaughtExceptions: true,
            forceWebViewSupport: false,
            enableServerListing: true,
            autoFixLegacyStyleAttr: true,
            showBootMenuOnLaunch: false,
            bootMenuBlocksUnsigned: false,
            allowBootMenu: true,
            allowUpdateSvc: true,
            allowFwdSlash: true
        };

        // ===== Loading Progress =====
        var loadingProgress = 0;
        var loadingText = "Initializing...";
        var loadingDetail = "";

        function setLoadingProgress(progress, text, detail) {
            loadingProgress = Math.max(0, Math.min(100, progress));
            loadingText = text || loadingText;
            loadingDetail = detail || "";

            var fill = document.getElementById("progress-fill");
            var textEl = document.getElementById("progress-text");
            var detailEl = document.getElementById("progress-detail");

            if (fill) fill.style.width = loadingProgress + "%";
            if (textEl) textEl.textContent = loadingText;
            if (detailEl) detailEl.textContent = loadingDetail;
        }

        function hideLoadingScreen() {
            var screen = document.getElementById("loading-screen");
            if (screen) {
                screen.classList.add("fade-out");
                setTimeout(function() {
                    screen.style.display = "none";
                }, 500);
            }
        }

        // ===== Error Handling =====
        function showError(message, details) {
            var overlay = document.getElementById("error-overlay");
            var msgEl = document.getElementById("error-message");
            var detEl = document.getElementById("error-details");

            if (msgEl) msgEl.textContent = message;
            if (detEl) detEl.textContent = details || "";
            if (overlay) overlay.classList.add("visible");
        }

        function showCrashReport(report) {
            var el = document.getElementById("crash-report");
            var content = document.getElementById("crash-report-content");
            if (content) content.textContent = report;
            if (el) el.classList.add("visible");
        }

        // ===== WebGL2 Check =====
        function checkWebGL2() {
            try {
                var canvas = document.createElement("canvas");
                var gl = canvas.getContext("webgl2");
                if (!gl) {
                    gl = canvas.getContext("experimental-webgl2");
                }
                if (!gl) {
                    showError(
                        "WebGL2 is not supported by your browser!",
                        "EaglerCraft 26.1.2 requires WebGL2 to run.\n\n" +
                        "Please try:\n" +
                        "• Updating your browser to the latest version\n" +
                        "• Enabling hardware acceleration in browser settings\n" +
                        "• Using a different browser (Chrome, Firefox, Edge)\n" +
                        "• Updating your graphics drivers"
                    );
                    return false;
                }
                return true;
            } catch (e) {
                showError("Failed to initialize WebGL2", e.message);
                return false;
            }
        }

        // ===== Service Worker Registration =====
        if ("serviceWorker" in navigator) {
            window.addEventListener("load", function() {
                navigator.serviceWorker.register("sw.js").then(function(registration) {
                    console.log("[EaglerCraft] Service Worker registered:", registration.scope);
                }).catch(function(error) {
                    console.warn("[EaglerCraft] Service Worker registration failed:", error);
                });
            });
        }

        // ===== Prevent Default Behaviors =====
        document.addEventListener("contextmenu", function(e) { e.preventDefault(); });
        document.addEventListener("dragover", function(e) { e.preventDefault(); });
        document.addEventListener("drop", function(e) { e.preventDefault(); });

        // ===== Mobile Touch Handling =====
        document.addEventListener("touchmove", function(e) {
            if (e.target === document.getElementById("eaglercraft")) {
                e.preventDefault();
            }
        }, { passive: false });

        // ===== Keyboard Shortcuts =====
        document.addEventListener("keydown", function(e) {
            // F11 - Toggle fullscreen
            if (e.key === "F11") {
                e.preventDefault();
                toggleFullscreen();
            }
            // Escape - Handle gracefully
            if (e.key === "Escape") {
                // Let EaglerCraft handle ESC internally
            }
        });

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(function() {});
            } else {
                document.exitFullscreen().catch(function() {});
            }
        }

        // ===== Resize Handler =====
        window.addEventListener("resize", function() {
            var canvas = document.getElementById("eaglercraft");
            if (canvas) {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }
        });

        // ===== Initialize =====
        (function() {
            setLoadingProgress(5, "Checking WebGL2 support...", "");

            if (!checkWebGL2()) {
                return;
            }

            setLoadingProgress(10, "Loading EaglerCraft...", "Please wait");

            // Set canvas size
            var canvas = document.getElementById("eaglercraft");
            if (canvas) {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }

            setLoadingProgress(15, "Loading engine...", "TeaVM Runtime");
        })();
    </script>

    <!-- EaglerCraft JavaScript Bundle -->
    <!-- EAGLERCRAFT_BUNDLE -->
    <!-- In development, individual script files are loaded: -->
    <!-- <script type="text/javascript" src="runtime.js"></script> -->
    <!-- <script type="text/javascript" src="classes.js"></script> -->
</body>
</html>
