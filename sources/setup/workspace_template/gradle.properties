# ============================================================================
# EaglerCraft 26.1.2 - Gradle Properties
# ============================================================================
#
# Project-wide Gradle configuration settings.
# These properties are shared across all modules and build variants.
#
# Generated by build_workspace.sh
# Modify with caution - incorrect settings can break the build.
#
# ============================================================================

# ---- Project Identity ----
project.name=EaglerCraft 26.1.2
project.group=net.lax1dude.eaglercraft
project.version=2.6.0

# ---- Java Configuration ----
# EaglerCraft v2.6 targets Java 25 with preview features enabled
java.source=25
java.target=25
java.encoding=UTF-8

# ---- JVM Memory Settings ----
# TeaVM compilation is memory-intensive; allocate sufficient heap space
# Adjust these values based on your system's available RAM:
#   - Minimum recommended: 2G
#   - For large projects: 4G-8G
org.gradle.jvmargs=-Xmx4G \
  -XX:+UseG1GC \
  -XX:+UseStringDeduplication \
  -XX:MaxMetaspaceSize=512m \
  -XX:+HeapDumpOnOutOfMemoryError \
  -XX:HeapDumpPath=./heapdump.hprof \
  --add-opens=java.base/java.lang=ALL-UNNAMED \
  --add-opens=java.base/java.lang.invoke=ALL-UNNAMED \
  --add-opens=java.base/java.util=ALL-UNNAMED \
  --add-opens=java.base/java.io=ALL-UNNAMED

# ---- Gradle Daemon ----
# Enable daemon for faster subsequent builds
org.gradle.daemon=true

# ---- Parallel Builds ----
# Enable parallel project execution (benefits multi-module projects)
org.gradle.parallel=true

# ---- Build Cache ----
# Enable Gradle build cache for faster incremental builds
org.gradle.caching=true

# ---- Configuration Cache ----
# Disable configuration cache (TeaVM plugin may not support it)
org.gradle.configuration-cache=false

# ---- TeaVM Configuration ----
teavm.version=0.15.0
teavm.mainClass=net.lax1dude.eaglercraft.v2_6.internal.teavm.MainClass
teavm.obfuscated=true
teavm.sourceMap=true
teavm.optimization=BALANCED
teavm.maxTopLevelNames=80000
teavm.targetFileName=classes.js

# ---- Desktop Runtime ----
# LWJGL version used for desktop (non-browser) runtime
lwjgl.version=3.3.1
lwjgl.natives=natives-windows

# ---- Minecraft Version ----
minecraft.version=26.1.2

# ---- Output Configuration ----
output.dir=output
output.offline=offline_download.html
output.epk=assets.epk

# ---- Preview Features ----
# Java 25 preview features are required for EaglerCraft v2.6
java.preview.features=true
