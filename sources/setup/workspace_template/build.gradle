/*
 * EaglerCraft 26.1.2 - Workspace Build Configuration
 *
 * This is the Gradle build file for the EaglerCraft 26.1.2 workspace.
 * It configures the TeaVM 0.15.0 compilation toolchain for converting
 * Minecraft 26.1.2 Java source code into browser-runnable JavaScript.
 *
 * No MCP deobfuscation is needed since MC 26.1.2 ships unobfuscated.
 */

plugins {
    id 'java'
    id 'org.teavm' version '0.15.0'
}

group = 'net.lax1dude.eaglercraft'
version = '2.6.0'

repositories {
    mavenCentral()
    flatDir { dirs 'desktopRuntime' }
}

dependencies {
    // TeaVM dependencies using new DSL shortcuts (0.15.0+)
    implementation teavm.libs.jso
    implementation teavm.libs.jsoApis
    implementation "org.teavm:teavm-classlib:0.15.0"

    // Minecraft 26.1.2 (unobfuscated - NO MCP needed)
    implementation files('libs/minecraft-26.1.2.jar')

    // Desktop runtime dependencies (LWJGL)
    implementation files('desktopRuntime/lwjgl.jar')
    implementation files('desktopRuntime/lwjgl-glfw.jar')
    implementation files('desktopRuntime/lwjgl-opengles.jar')
    implementation files('desktopRuntime/lwjgl-openal.jar')
    implementation files('desktopRuntime/lwjgl-egl.jar')
    implementation files('desktopRuntime/lwjgl-jemalloc.jar')
    implementation files('desktopRuntime/codecjorbis-20101023.jar')
    implementation files('desktopRuntime/codecwav-20101023.jar')
    implementation files('desktopRuntime/soundsystem-20120107.jar')
    implementation files('desktopRuntime/Java-WebSocket-1.5.1-with-dependencies.jar')
    implementation files('desktopRuntime/UnsafeMemcpy.jar')
}

sourceSets {
    main {
        java {
            srcDirs = ['src/main/java']
        }
        resources {
            srcDirs = ['src/resources']
        }
    }
    // The teavm source set is auto-created by the TeaVM 0.15.0 plugin
    teavm {
        java {
            srcDirs = ['src/teavm/java']
        }
    }
    lwjgl {
        java {
            srcDirs = ['src/lwjgl/java']
        }
    }
}

java {
    sourceCompatibility = JavaVersion.VERSION_25
    targetCompatibility = JavaVersion.VERSION_25
}

tasks.withType(JavaCompile) {
    options.encoding = 'UTF-8'
    options.release = 25
    options.fork = true
}

// ============================================================
// TeaVM Configuration (0.15.0 DSL)
// ============================================================
// See: https://teavm.org/docs/tooling/gradle.html
// mainClass, optimization go in teavm.all { }, NOT in teavm { }
teavm {
    all {
        mainClass = 'net.lax1dude.eaglercraft.v2_6.internal.teavm.MainClass'
        optimization = org.teavm.gradle.api.OptimizationLevel.BALANCED
    }

    js {
        obfuscated = true
        sourceMap = true
        targetFileName = 'classes.js'
        maxTopLevelNames = 80000
    }
}

tasks.withType(JavaCompile) {
    options.encoding = 'UTF-8'
    options.compilerArgs += ['--enable-preview']
}

// Custom tasks
task compileJS(type: Copy) {
    dependsOn generateJavaScript
    from layout.buildDirectory.dir('generated/teavm/js')
    include 'classes.js'
    include 'classes.js.map'
    into 'javascript/dist'
}

task makeOfflineDownload(type: JavaExec) {
    mainClass = 'net.lax1dude.eaglercraft.v2_6.gui.MakeOfflineDownload'
    classpath = sourceSets.main.runtimeClasspath
    args = ['javascript/dist', 'output/offline_download.html']
}

task makeEPK(type: JavaExec) {
    mainClass = 'net.lax1dude.eaglercraft.v2_6.gui.EPKCompiler'
    classpath = sourceSets.main.runtimeClasspath
    args = ['src/resources', 'output/assets.epk']
}
