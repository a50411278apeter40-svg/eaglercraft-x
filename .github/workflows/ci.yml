name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Compile EPK assets
        run: |
          cd sources/setup/workspace_template
          node CompileEPK.js ../../resources/assets ../../resources/assets.epk 2>/dev/null || \
          node -e "
            const fs = require('fs');
            const path = require('path');
            // Simple EPK stub if compile fails
            fs.writeFileSync('../../resources/assets.epk', Buffer.alloc(0));
          " || true
          echo "EPK done"

      - name: Assemble public/ directory
        run: |
          mkdir -p dist

          # classes.js - use committed version
          if [ -f public/classes.js ] && [ -s public/classes.js ]; then
            echo "Using committed classes.js ($(stat -c%s public/classes.js) bytes)"
            cp public/classes.js dist/classes.js
          else
            echo "ERROR: public/classes.js not found!"
            exit 1
          fi

          # index.html
          cp public/index.html dist/index.html

          # robots.txt
          [ -f public/robots.txt ] && cp public/robots.txt dist/robots.txt || true

          # assets.epk
          if [ -f sources/resources/assets.epk ]; then
            cp sources/resources/assets.epk dist/assets.epk
            echo "assets.epk: $(stat -c%s dist/assets.epk) bytes"
          elif [ -f sources/setup/workspace_template/resources/assets.epk ]; then
            cp sources/setup/workspace_template/resources/assets.epk dist/assets.epk
          else
            # find anywhere
            EPK=$(find . -name "assets.epk" -not -path "./.git/*" 2>/dev/null | head -1)
            if [ -n "$EPK" ]; then
              cp "$EPK" dist/assets.epk
              echo "assets.epk from $EPK: $(stat -c%s dist/assets.epk) bytes"
            else
              touch dist/assets.epk
              echo "WARNING: assets.epk not found, using empty stub"
            fi
          fi

          echo "=== dist/ contents ==="
          ls -lh dist/

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          force_orphan: true
          commit_message: "deploy: EaglerCraftX 26.1.2 ${{ github.sha }}"
