name: Build & Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Download Minecraft 26.1.2 client JAR
        run: |
          mkdir -p sources/libs
          echo "Downloading Minecraft 26.1.2 from Mojang..."
          curl -L -o sources/libs/minecraft-26.1.2.jar \
            "https://piston-data.mojang.com/v1/objects/4e618f09a0c649dde3fdf829df443ce0b8831e65/client.jar"
          echo "Downloaded: $(du -h sources/libs/minecraft-26.1.2.jar | cut -f1)"

      - name: Download MC dependency libraries
        run: |
          mkdir -p sources/libs
          cd sources/libs

          # Download all required MC libraries from Mojang CDN
          declare -A LIBS=(
            ["logging-1.6.11.jar"]="https://libraries.minecraft.net/com/mojang/logging/1.6.11/logging-1.6.11.jar"
            ["brigadier-1.3.10.jar"]="https://libraries.minecraft.net/com/mojang/brigadier/1.3.10/brigadier-1.3.10.jar"
            ["datafixerupper-9.0.19.jar"]="https://libraries.minecraft.net/com/mojang/datafixerupper/9.0.19/datafixerupper-9.0.19.jar"
            ["authlib-7.0.63.jar"]="https://libraries.minecraft.net/com/mojang/authlib/7.0.63/authlib-7.0.63.jar"
            ["blocklist-1.0.10.jar"]="https://libraries.minecraft.net/com/mojang/blocklist/1.0.10/blocklist-1.0.10.jar"
            ["patchy-2.2.10.jar"]="https://libraries.minecraft.net/com/mojang/patchy/2.2.10/patchy-2.2.10.jar"
            ["text2speech-1.18.11.jar"]="https://libraries.minecraft.net/com/mojang/text2speech/1.18.11/text2speech-1.18.11.jar"
            ["jtracy-1.0.37.jar"]="https://libraries.minecraft.net/com/mojang/jtracy/1.0.37/jtracy-1.0.37.jar"
            ["gson-2.13.2.jar"]="https://libraries.minecraft.net/com/google/code/gson/gson/2.13.2/gson-2.13.2.jar"
            ["guava-33.5.0-jre.jar"]="https://libraries.minecraft.net/com/google/guava/guava/33.5.0-jre/guava-33.5.0-jre.jar"
            ["failureaccess-1.0.3.jar"]="https://libraries.minecraft.net/com/google/guava/failureaccess/1.0.3/failureaccess-1.0.3.jar"
            ["commons-lang3-3.19.0.jar"]="https://libraries.minecraft.net/org/apache/commons/commons-lang3/3.19.0/commons-lang3-3.19.0.jar"
            ["commons-compress-1.28.0.jar"]="https://libraries.minecraft.net/org/apache/commons/commons-compress/1.28.0/commons-compress-1.28.0.jar"
            ["commons-io-2.20.0.jar"]="https://libraries.minecraft.net/commons-io/commons-io/2.20.0/commons-io-2.20.0.jar"
            ["commons-codec-1.19.0.jar"]="https://libraries.minecraft.net/commons-codec/commons-codec/1.19.0/commons-codec-1.19.0.jar"
            ["fastutil-8.5.18.jar"]="https://libraries.minecraft.net/it/unimi/dsi/fastutil/8.5.18/fastutil-8.5.18.jar"
            ["log4j-api-2.25.2.jar"]="https://libraries.minecraft.net/org/apache/logging/log4j/log4j-api/2.25.2/log4j-api-2.25.2.jar"
            ["log4j-core-2.25.2.jar"]="https://libraries.minecraft.net/org/apache/logging/log4j/log4j-core/2.25.2/log4j-core-2.25.2.jar"
            ["jspecify-1.0.0.jar"]="https://libraries.minecraft.net/org/jspecify/jspecify/1.0.0/jspecify-1.0.0.jar"
            ["netty-buffer-4.2.7.Final.jar"]="https://libraries.minecraft.net/io/netty/netty-buffer/4.2.7.Final/netty-buffer-4.2.7.Final.jar"
            ["netty-common-4.2.7.Final.jar"]="https://libraries.minecraft.net/io/netty/netty-common/4.2.7.Final/netty-common-4.2.7.Final.jar"
            ["netty-transport-4.2.7.Final.jar"]="https://libraries.minecraft.net/io/netty/netty-transport/4.2.7.Final/netty-transport-4.2.7.Final.jar"
            ["netty-codec-base-4.2.7.Final.jar"]="https://libraries.minecraft.net/io/netty/netty-codec-base/4.2.7.Final/netty-codec-base-4.2.7.Final.jar"
            ["netty-codec-compression-4.2.7.Final.jar"]="https://libraries.minecraft.net/io/netty/netty-codec-compression/4.2.7.Final/netty-codec-compression-4.2.7.Final.jar"
            ["netty-handler-4.2.7.Final.jar"]="https://libraries.minecraft.net/io/netty/netty-handler/4.2.7.Final/netty-handler-4.2.7.Final.jar"
            ["jopt-simple-5.0.4.jar"]="https://libraries.minecraft.net/net/sf/jopt-simple/jopt-simple/5.0.4/jopt-simple-5.0.4.jar"
          )

          for fname in "${!LIBS[@]}"; do
            url="${LIBS[$fname]}"
            echo "  Downloading $fname..."
            curl -L -s -o "$fname" "$url" || echo "  WARNING: Failed to download $fname"
          done

          echo "=== Downloaded libs ==="
          ls -lh *.jar | awk '{print $5, $9}'

      - name: Create teavm-patches stub
        run: |
          # Create empty teavm-patches.jar (stub for now)
          cd sources/libs
          mkdir -p /tmp/teavm-patches-stub
          jar cf teavm-patches.jar -C /tmp/teavm-patches-stub .
          echo "Created teavm-patches stub"

      - name: Create desktopRuntime stubs
        run: |
          mkdir -p sources/desktopRuntime
          # Create empty JAR stubs for LWJGL (only needed for desktop, not TeaVM)
          for jar in lwjgl lwjgl-glfw lwjgl-opengles lwjgl-openal jorbis codecjorbis soundsystem; do
            mkdir -p /tmp/stub-$jar
            jar cf sources/desktopRuntime/$jar.jar -C /tmp/stub-$jar . 2>/dev/null || true
          done
          echo "Created desktopRuntime stubs:"
          ls sources/desktopRuntime/

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Pull TeaVM dependencies (populate Gradle cache)
        run: |
          ./gradlew :sources:teavmPluginJar --no-daemon --info 2>&1 | tail -30 || true

      - name: Patch TeaVM ASM for Java 21 compatibility
        run: |
          python3 scripts/patch_teavm_asm.py

      - name: Run TeaVM compilation (generateJavaScript)
        run: |
          ./gradlew :sources:generateJavaScript --no-daemon --info 2>&1 | tee /tmp/teavm-build.log
          echo "=== Last 50 lines ==="
          tail -50 /tmp/teavm-build.log

      - name: Compile EPK assets
        run: |
          cd sources/setup/workspace_template 2>/dev/null || true
          if [ -f CompileEPK.js ]; then
            node CompileEPK.js ../../resources/assets ../../resources/assets.epk 2>/dev/null || true
          fi

      - name: Assemble dist/
        run: |
          mkdir -p dist

          # classes.js from TeaVM output (official path: sources/build/generated/teavm/js/)
          if [ -f sources/build/generated/teavm/js/classes.js ]; then
            echo "Using TeaVM output: sources/build/generated/teavm/js/classes.js ($(du -h sources/build/generated/teavm/js/classes.js | cut -f1))"
            cp sources/build/generated/teavm/js/classes.js dist/classes.js
          else
            TEAVM_OUT=$(find sources/build -name "classes.js" -not -path "./.git/*" 2>/dev/null | head -1)
            if [ -n "$TEAVM_OUT" ]; then
              echo "Using TeaVM output: $TEAVM_OUT ($(du -h "$TEAVM_OUT" | cut -f1))"
              cp "$TEAVM_OUT" dist/classes.js
            else
              echo "WARNING: TeaVM output not found, using stub"
              cp public/classes.js dist/classes.js
            fi
          fi

          cp public/index.html dist/index.html
          [ -f public/robots.txt ] && cp public/robots.txt dist/robots.txt || true

          # assets.epk
          EPK=$(find . -name "assets.epk" -not -path "./.git/*" 2>/dev/null | head -1)
          if [ -n "$EPK" ]; then
            cp "$EPK" dist/assets.epk
          else
            touch dist/assets.epk
          fi

          echo "=== dist/ ==="
          ls -lh dist/

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          force_orphan: true
          commit_message: "deploy: EaglerCraftX 26.1.2 ${{ github.sha }}"
